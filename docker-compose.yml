# SQLite + Uploads nur über Volume überlebensfähig machen (sonst: bei jedem Deploy leerer Container).
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-change-me-in-production}
      # Optional: Superadmin-Benutzername (Standard letzgo), gleiche Session wie OV-Login:
      # SUPERADMIN_USERNAME: letzgo
      # Mandant per Subdomain (optional): Host „slug.<BASE>“ → ohne /m/slug in der URL
      # Beispiel lokal: MANDANT_HOST_BASE_DOMAIN=localhost → http://westerstede.localhost:8000/login
      # Statt Subdomain (nur Tests): MANDANT_HOST_IS_RAW_SLUG=true → Hostname = Slug, z. B. http://westerstede:8000/
      # MANDANT_HOST_BASE_DOMAIN: ${MANDANT_HOST_BASE_DOMAIN:-}
      # MANDANT_HOST_IS_RAW_SLUG: ${MANDANT_HOST_IS_RAW_SLUG:-}
      # URLs ohne /m/<slug> im Browser (Host + Slug müssen gesetzt sein):
      # PUBLIC_SITE_HOSTS=wahlkampf.spd-wst.de
      # PUBLIC_SITE_MANDANT_SLUG=westerstede
      # Achtung: MANDANT_HOST_BASE_DOMAIN=spd-wst.de macht aus wahlkampf.spd-wst.de den Slug „wahlkampf“, nicht „westerstede“.
    volumes:
      - wahlkampf-data:/data

volumes:
  wahlkampf-data:
