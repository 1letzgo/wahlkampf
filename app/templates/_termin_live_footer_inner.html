{% import '_icons.html' as ico %}
{% if not termin_vergangen %}
{% if row.ich_teilnehme %}
<form method="post" action="{{ mp }}/termine/{{ termin_id }}/absagen" data-teilnahme-live style="margin:0;">
  {% if return_to_list %}<input type="hidden" name="return_to" value="list">{% endif %}
  <button type="submit" class="btn btn-admin btn-sm btn-ico btn-xs" aria-label="Zusage zurücknehmen" title="Zusage zurücknehmen">
    {{ ico.svg_check() }}
  </button>
</form>
{% elif row.ich_abgesagt %}
<form method="post" action="{{ mp }}/termine/{{ termin_id }}/teilnehmen" data-teilnahme-live style="margin:0;">
  {% if return_to_list %}<input type="hidden" name="return_to" value="list">{% endif %}
  <button type="submit" class="btn btn-sm btn-ico btn-with-label" aria-label="Erneut zusagen">
    {{ ico.svg_check() }}<span class="btn-text">Teilnehmen</span>
  </button>
</form>
{% else %}
<form method="post" action="{{ mp }}/termine/{{ termin_id }}/teilnehmen" data-teilnahme-live style="margin:0;">
  {% if return_to_list %}<input type="hidden" name="return_to" value="list">{% endif %}
  <button type="submit" class="btn btn-sm btn-ico btn-with-label" aria-label="Am Termin teilnehmen">
    {{ ico.svg_check() }}<span class="btn-text">Teilnehmen</span>
  </button>
</form>
<form method="post" action="{{ mp }}/termine/{{ termin_id }}/absagen" data-teilnahme-live style="margin:0;">
  {% if return_to_list %}<input type="hidden" name="return_to" value="list">{% endif %}
  <button type="submit" class="btn btn-ghost btn-sm btn-ico btn-with-label" aria-label="Termin absagen">
    {{ ico.svg_minus_circle() }}<span class="btn-text">Absage</span>
  </button>
</form>
{% endif %}
{% endif %}
