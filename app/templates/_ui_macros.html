{% macro app_header(title, menu=False) %}
<header class="site-header{% if menu %} site-header--menu{% endif %}">
  <div class="header-inner">
    <a href="/menu" class="header-brand">SPD vor Ort</a>
    <div class="header-toolbar-spacer" aria-hidden="true"></div>
    <h1 class="header-page-title">{{ title }}</h1>
  </div>
</header>
{% endmacro %}

{% macro app_header_toolbar(title, menu=False) %}
<header class="site-header{% if menu %} site-header--menu{% endif %}">
  <div class="header-inner">
    <a href="/menu" class="header-brand">SPD vor Ort</a>
    <nav class="header-toolbar" aria-label="Seitenaktionen">
      {{ caller() }}
    </nav>
    <h1 class="header-page-title">{{ title }}</h1>
  </div>
</header>
{% endmacro %}
