<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c41e3a" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SPD vor Ort">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  {% set path_prefix = request.scope.get('root_path') or '' %}
  <link rel="manifest" href="{{ path_prefix }}/manifest.webmanifest">
  <link rel="icon" href="{{ path_prefix }}/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ path_prefix }}/static/icon.svg">
  <title>{% block title %}Wahlkampf{% endblock %}</title>
  <link rel="stylesheet" href="{{ path_prefix }}/static/app.css">
  {% include '_ics_surface_styles.html' %}
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
  <script>
    (function () {
      var lastApplied = 0;
      function syncWrapHeaderPad() {
        var header = document.querySelector("header.site-header");
        var wrap = document.querySelector(".wrap");
        if (!header || !wrap) return;
        var gapRem = 1.5;
        var gapPx = gapRem * parseFloat(getComputedStyle(document.documentElement).fontSize) || 24;
        var h = header.getBoundingClientRect().height;
        if (!h) return;
        var pad = Math.ceil(h + gapPx);
        if (pad === lastApplied) return;
        lastApplied = pad;
        wrap.style.paddingTop = pad + "px";
      }
      function nudge() {
        syncWrapHeaderPad();
        requestAnimationFrame(syncWrapHeaderPad);
      }
      function init() {
        nudge();
        // PWA-Erststart auf iOS: safe-area-inset, Fonts und Layout brauchen
        // teils mehrere Frames, bis die endgültige Header-Höhe steht.
        [50, 150, 350, 800, 1500].forEach(function (ms) {
          setTimeout(syncWrapHeaderPad, ms);
        });
        window.addEventListener("resize", syncWrapHeaderPad);
        window.addEventListener("orientationchange", nudge);
        window.addEventListener("pageshow", nudge);
        document.addEventListener("visibilitychange", function () {
          if (!document.hidden) nudge();
        });
        if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === "function") {
          document.fonts.ready.then(nudge).catch(function () {});
        }
        var header = document.querySelector("header.site-header");
        if (header && typeof ResizeObserver !== "undefined") {
          new ResizeObserver(syncWrapHeaderPad).observe(header);
        }
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
      window.addEventListener("load", nudge);
    })();
  </script>
  <script>
    (function () {
      var inPwa =
        window.matchMedia("(display-mode: standalone)").matches ||
        (typeof navigator !== "undefined" && navigator.standalone === true);
      if (!inPwa) return;
      document.addEventListener(
        "click",
        function (e) {
          var a = e.target.closest("a");
          if (!a || a.hasAttribute("download")) return;
          var tgt = (a.getAttribute("target") || "").toLowerCase();
          if (tgt !== "_blank") return;
          try {
            if (new URL(a.href, location.href).origin === location.origin) {
              e.preventDefault();
              location.href = a.href;
            }
          } catch (err) {}
        },
        true
      );
    })();
  </script>
</body>
</html>
