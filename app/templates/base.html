<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e8e4dc" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}Wahlkampf{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #e8e4dc;
      --card: #fff;
      --text: #1a1a1a;
      --muted: #5c5c5c;
      --accent: #c41e3a;
      --accent-dim: #9e1830;
      --border: #e2ddd6;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    * { box-sizing: border-box; }
    html { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 99;
      pointer-events: none;
      background: var(--bg);
      height: constant(safe-area-inset-top);
      height: env(safe-area-inset-top, 0px);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding-top: calc(1.25rem + constant(safe-area-inset-top));
      padding-top: calc(1.25rem + env(safe-area-inset-top, 0px));
      padding-right: max(1rem, env(safe-area-inset-right, 0px));
      padding-bottom: max(3rem, calc(1.25rem + env(safe-area-inset-bottom, 0px)));
      padding-left: max(1rem, env(safe-area-inset-left, 0px));
    }
    header {
      position: sticky;
      top: constant(safe-area-inset-top);
      top: env(safe-area-inset-top, 0px);
      z-index: 100;
      margin-left: calc(-1 * max(1rem, env(safe-area-inset-left, 0px)));
      margin-right: calc(-1 * max(1rem, env(safe-area-inset-right, 0px)));
      margin-bottom: 1.5rem;
      padding: 0.65rem max(1rem, env(safe-area-inset-right, 0px)) 0.65rem max(1rem, env(safe-area-inset-left, 0px));
      background: var(--bg);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }
    header h1 { font-size: 1.25rem; margin: 0; font-weight: 650; }
    .header-inner {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }
    .header-inner > h1 {
      flex: 1 1 10rem;
      min-width: 0;
    }
    .nav,
    .header-toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      font-size: .95rem;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 1 1 auto;
      min-width: 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: .5rem .85rem;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff !important;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none !important;
      font-size: .95rem;
      font-family: inherit;
      line-height: 1.5;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn:hover { background: var(--accent-dim); }
    .btn-sm { padding: .42rem .7rem; font-size: .875rem; }
    .btn-xs {
      padding: .28rem .5rem;
      font-size: .72rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .btn-ghost {
      background: transparent;
      color: var(--accent) !important;
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: #7a1e2e;
      border-color: #5c1622;
    }
    .btn-danger:hover { background: #5c1622; }
    .btn-admin {
      background: #1e7a4c;
      color: #fff !important;
      border: 1px solid #16633d;
    }
    .btn-admin:hover { background: #16633d; }
    .btn-ico { gap: .35rem; }
    .btn-ico .ico {
      width: 1.2em;
      height: 1.2em;
      flex-shrink: 0;
    }
    .btn-ico.btn-xs .ico { width: 1.05em; height: 1.05em; }
    .btn-admin.btn-ico { position: relative; }
    .btn-pending-badge {
      position: absolute;
      top: -0.4rem;
      right: -0.4rem;
      min-width: 1.15rem;
      height: 1.15rem;
      padding: 0 .22rem;
      font-size: .65rem;
      font-weight: 700;
      line-height: 1.05rem;
      text-align: center;
      background: #c41e3a;
      color: #fff;
      border-radius: 999px;
      border: 2px solid var(--card);
    }
    @media (min-width: 641px) {
      .btn-pending-badge { display: none; }
    }
    @media (max-width: 640px) {
      .btn-ico .btn-text { display: none; }
      .btn-ico:not(.btn-xs) {
        padding: .5rem;
        min-width: 2.5rem;
        min-height: 2.5rem;
      }
      .btn-ico.btn-sm:not(.btn-xs) {
        padding: .45rem;
        min-width: 2.35rem;
        min-height: 2.35rem;
      }
      .btn-ico.btn-xs { min-width: 2.35rem; min-height: 2.35rem; padding: .4rem; }
      .lbl-short { display: inline !important; }
      .lbl-full { display: none !important; }
    }
    @media (min-width: 641px) {
      .lbl-short { display: none !important; }
      .lbl-full { display: inline !important; }
    }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .muted { color: var(--muted); font-size: .9rem; }
    .error {
      background: #fde8ec;
      border: 1px solid #f3b8c4;
      color: #7a1e2e;
      padding: .75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .info {
      background: #e8f2ec;
      border: 1px solid #a8d4b8;
      color: #1e4d2e;
      padding: .75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    label { display: block; font-weight: 600; margin: .75rem 0 .35rem; font-size: .9rem; }
    input[type="text"], input[type="password"], input[type="date"], input[type="file"], textarea {
      width: 100%;
      padding: .55rem .65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }
    input[type="file"] { padding: .4rem; }
    textarea { min-height: 100px; resize: vertical; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    @media (max-width: 520px) { .row2 { grid-template-columns: 1fr; } }
    dialog.popup-dialog {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      max-width: min(100vw - 2rem, 480px);
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      background: var(--card);
      color: var(--text);
    }
    dialog.popup-dialog::backdrop {
      background: rgba(0,0,0,.35);
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
