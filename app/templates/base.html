<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c41e3a" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SPD vor Ort">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  {% set path_prefix = request.scope.get('root_path') or '' %}
  <link rel="manifest" href="{{ path_prefix }}/manifest.webmanifest">
  <link rel="icon" href="{{ path_prefix }}/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ path_prefix }}/static/icon.svg">
  <title>{% block title %}Wahlkampf{% endblock %}</title>
  <link rel="stylesheet" href="{{ path_prefix }}/static/app.css">
  {% include '_ics_surface_styles.html' %}
  {% block head %}{% endblock %}
</head>
<body>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
  {% include '_app_footer_nav.html' %}
  <script>
    (function () {
      function gapPx(rem) {
        return rem * (parseFloat(getComputedStyle(document.documentElement).fontSize) || 16);
      }
      function syncWrapChromePad() {
        var wrap = document.querySelector(".wrap");
        if (!wrap) return;
        var header = document.querySelector("header.site-header");
        if (header) {
          wrap.style.paddingTop =
            Math.ceil(header.getBoundingClientRect().height + gapPx(1.5)) + "px";
        }
        var footerNav = document.querySelector("nav.site-footer-nav");
        if (footerNav) {
          wrap.style.paddingBottom =
            Math.ceil(footerNav.getBoundingClientRect().height + gapPx(0.65)) + "px";
        } else {
          wrap.style.paddingBottom = "";
        }
      }
      function init() {
        syncWrapChromePad();
        requestAnimationFrame(syncWrapChromePad);
        window.addEventListener("resize", syncWrapChromePad);
        var headerEl = document.querySelector("header.site-header");
        if (headerEl && typeof ResizeObserver !== "undefined") {
          new ResizeObserver(syncWrapChromePad).observe(headerEl);
        }
        var footerNav = document.querySelector("nav.site-footer-nav");
        if (footerNav && typeof ResizeObserver !== "undefined") {
          new ResizeObserver(syncWrapChromePad).observe(footerNav);
        }
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
  <script>
    (function () {
      var inPwa =
        window.matchMedia("(display-mode: standalone)").matches ||
        (typeof navigator !== "undefined" && navigator.standalone === true);
      if (!inPwa) return;
      document.addEventListener(
        "click",
        function (e) {
          var a = e.target.closest("a");
          if (!a || a.hasAttribute("download")) return;
          var tgt = (a.getAttribute("target") || "").toLowerCase();
          if (tgt !== "_blank") return;
          try {
            if (new URL(a.href, location.href).origin === location.origin) {
              e.preventDefault();
              location.href = a.href;
            }
          } catch (err) {}
        },
        true
      );
    })();
  </script>
</body>
</html>
