{% extends "base.html" %}
{% import '_icons.html' as ico %}
{% block title %}Wahlkampf — Start{% endblock %}
{% block body %}
<header>
  <div class="header-inner">
    <h1>Wahlkampf</h1>
  </div>
</header>
<div class="card" style="max-width: 520px; margin: 0 auto;">
  <h2 style="margin-top:0;">Willkommen</h2>
  <p class="muted" style="margin-top:0;">Termine und Kalender für den Ortsverein.</p>
  <p style="margin: 1.25rem 0 0; display:flex; flex-wrap:wrap; gap:.5rem;">
    <a class="btn btn-ico" href="/login" aria-label="Anmelden">
      {{ ico.svg_login() }}<span class="btn-text">Anmelden</span>
    </a>
    <a class="btn btn-ghost btn-ico" href="/registrierung" aria-label="Registrieren">
      {{ ico.svg_user_plus() }}<span class="btn-text">Registrieren</span>
    </a>
  </p>
</div>
{% endblock %}
